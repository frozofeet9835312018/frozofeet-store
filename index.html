<!DOCTYPE html>
<html>
<head>
  <title>Frozofeet Store</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: linear-gradient(to right, #ff9966, #ff5e62);
      color: white;
    }

    .product {
      background: white;
      color: black;
      border-radius: 10px;
      padding: 10px;
      margin: 10px;
    }

    button {
      padding: 8px;
      margin: 5px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>Frozofeet Juice Store 🍹</h1>

<!-- LOGIN -->
<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">
<button onclick="loginUser()">Login</button>

<br><br>
<button onclick="signupUser()">Signup</button>

<!-- ADMIN BUTTON (HIDDEN) -->
<button id="adminBtn" onclick="openAdmin()" style="display:none;">
  Admin Panel 👑
</button>

<!-- PRODUCTS -->
<h2>Products</h2>
<div id="productList"></div>

<!-- CART -->
<h2>Cart 🛒</h2>
<button onclick="placeOrder()">Place Order</button>

<!-- PAYMENT -->
<div id="paymentModal" style="display:none; position:fixed; top:30%; left:30%; background:white; color:black; padding:20px;">
  <h3>Total: ₹<span id="totalAmount"></span></h3>
  <button onclick="confirmPayment()">Pay</button>
  <button onclick="closePayment()">Close</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); overflow:auto;">

  <div style="background:white; width:300px; margin:50px auto; padding:20px; border-radius:10px; max-height:80vh; overflow-y:auto; color:black;">

    <h2>Admin Panel 👑</h2>

    <input type="text" id="pName" placeholder="Product Name"><br><br>
    <input type="number" id="pPrice" placeholder="Price"><br><br>
    <input type="text" id="pDesc" placeholder="Description"><br><br>
    <input type="text" id="pImage" placeholder="Image URL"><br><br>

    <button onclick="addProduct()">Add Product</button>
    <button onclick="closeAdmin()">Close</button>

    <hr>

    <h3>Orders 📦</h3>
    <button onclick="showOrders()">View Orders</button>
    <div id="orderList" style="max-height:200px; overflow-y:auto; border:1px solid black; padding:10px;"></div>

  </div>
</div>

<script src="script.js"></script>

</body>
</html>
